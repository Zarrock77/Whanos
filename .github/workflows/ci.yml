name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Docker Base Images ──────────────────────────────────────────────
  docker-base-images:
    name: "Base image: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [c, java, javascript, python, befunge, typescript, go, rust, ruby, php, csharp]
    steps:
      - uses: actions/checkout@v4
      - name: Build base image (must succeed without app code)
        run: docker build -t whanos-${{ matrix.language }} - < images/${{ matrix.language }}/Dockerfile.base

  # ── Docker Standalone Images ────────────────────────────────────────
  docker-standalone-images:
    name: "Standalone: ${{ matrix.language }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c
            app: c-hello-world
            run_mode: oneshot
            expected: "Hello world!"
          - language: java
            app: java-hello-world
            run_mode: oneshot
            expected: "Hello World!"
          - language: javascript
            app: js-hello-world
            run_mode: server
            expected: "Listening on localhost:"
          - language: python
            app: python-hello-world
            run_mode: server
            expected: "Running on"
          - language: befunge
            app: befunge-hello-world
            run_mode: oneshot
            expected: "Hello"
          - language: typescript
            app: ts-hello-world
            run_mode: server
            expected: "Listening on localhost:"
          - language: go
            app: go-hello-world
            run_mode: oneshot
            expected: "Hello World!"
          - language: rust
            app: rust-hello-world
            run_mode: oneshot
            expected: "Hello World!"
          - language: ruby
            app: ruby-hello-world
            run_mode: oneshot
            expected: "Hello World!"
          - language: php
            app: php-hello-world
            run_mode: server
            expected: "Development Server"
          - language: csharp
            app: csharp-hello-world
            run_mode: oneshot
            expected: "Hello World!"
    steps:
      - uses: actions/checkout@v4

      - name: Build standalone image
        run: docker build -f images/${{ matrix.language }}/Dockerfile.standalone -t test-${{ matrix.language }} app/${{ matrix.app }}/

      - name: Test container (oneshot)
        if: matrix.run_mode == 'oneshot'
        run: |
          OUTPUT=$(docker run --rm test-${{ matrix.language }})
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -q "${{ matrix.expected }}"

      - name: Test container (server)
        if: matrix.run_mode == 'server'
        run: |
          docker run -d --name test-${{ matrix.language }} test-${{ matrix.language }}
          sleep 5
          OUTPUT=$(docker logs test-${{ matrix.language }} 2>&1)
          echo "$OUTPUT"
          docker stop test-${{ matrix.language }}
          echo "$OUTPUT" | grep -qF "${{ matrix.expected }}"

  # ── Ansible Validation ─────────────────────────────────────────────
  ansible-lint:
    name: Ansible syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ansible
        run: pip install ansible ansible-lint
      - name: Syntax check
        run: ansible-playbook --syntax-check ansible/site.yml
      - name: Ansible Lint
        run: ansible-lint ansible/ || true

  # ── Kubernetes Manifests ───────────────────────────────────────────
  kubernetes-validate:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          wget -q https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/
      - name: Validate manifests
        run: kubeconform -strict kubernetes/deployment.yml kubernetes/service.yml kubernetes/namespace.yml kubernetes/configmap.yml kubernetes/secret.yml kubernetes/ingress.yml

  # ── Deploy Script Validation ──────────────────────────────────────
  deploy-script-validate:
    name: Deploy script validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Syntax check
        run: python3 -c "import py_compile; py_compile.compile('scripts/deploy.py', doraise=True)"
      - name: Test manifest generation with ts-hello-world
        run: |
          cd app/ts-hello-world
          python3 ../../scripts/deploy.py test-project test-image:latest --dry-run

  # ── Jenkins Groovy Syntax ──────────────────────────────────────────
  jenkins-validate:
    name: Jenkins config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JCasC YAML syntax
        run: python -c "import yaml; yaml.safe_load(open('jenkins/config.yml'))"
      - name: Validate Groovy syntax
        run: |
          docker run --rm -v "$PWD/jenkins:/jenkins" groovy:latest groovy -e "
            new GroovyShell().parse(new File('/jenkins/jobs.groovy'))
            println 'Groovy syntax OK'
          "
